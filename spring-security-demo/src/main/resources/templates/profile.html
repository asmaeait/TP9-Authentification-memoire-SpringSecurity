<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mon Profil - Application Sécurisée</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body>
<div class="container-custom">
    <div class="card-custom">
        <h1> Mon Profil</h1>

        <div class="info-box">
            <strong> Informations personnelles</strong><br>
            Nom d'utilisateur : <strong th:text="${username}"></strong><br>
            Rôles : <strong th:text="${roles}"></strong><br>
            Statut : <span class="text-success">✓ Connecté</span><br>
            Heure de consultation : <strong th:text="${currentTime}"></strong>
        </div>

        <div class="mt-4">
            <a href="/" class="btn-custom"> Retour</a>
        </div>
    </div>
</div>
</body>
</html>
